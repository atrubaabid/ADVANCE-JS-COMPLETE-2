<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
    }

    body {
        background-color: black;
        color: white;
    }

    .clock {
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;

        & .time {
            border: 1px solid yellow;
            padding: 1rem 2rem;
            border-radius: 15px;
            box-shadow: 0px 0px 10px 2px yellow;
        }
    }
</style>

<body>

    <div class="clock">
        <h1 class="time">00:00:00 PM</h1>
    </div>


    <script>

        // DIGITAL-WATCH
        let time = document.querySelector(".time")

        let watch = setInterval(() => {
            let date = new Date().toLocaleTimeString();
            time.innerHTML = date;
        }, 1000)




        // stop after 5s

        // setTimeout(() => {
        //     clearInterval(watch)
        // }, 5000)




    </script>
</body>

</html>
