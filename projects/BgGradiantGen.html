<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }

    body {
        background-image: linear-gradient(to right, red, blue);
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;

    }

    .box {
        width: 60%;
        background-color: rgba(255, 255, 255, 0.11);
        padding: 2rem;
        border-radius: 20px;
        display: grid;
        place-items: center;

        & h2 {
            text-align: center;
            color: white;
            margin-bottom: 3rem;

        }

        & .btn1,
        .btn2 {
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
        }

        & .btn1 {
            background-color: blue;
            color: white;


        }

        & .btn2 {
            background-color: yellow;
            color: black;
            margin-left: 20px;

        }

        & p {
            margin-top: 30px;
            color: white;
            font-weight: 600;
        }


        & .copycode {
            background-color: rgba(255, 255, 255, 0.178);
            padding: 1rem;
            margin-top: 30px;
            border-radius: 5px;
            border-left: 5px solid white;
            color: white;

        }



    }
</style>

<body>


    <div class="box">
        <h2>BACKGROUND GRADIANT GENERATOR</h2>

        <div>
            <button class="btn1">#123fgh</button>
            <button class="btn2">#123fgh</button>
        </div>
        <p id="copied">Click to copy the code</p>
        <div class="copycode"> background-image: linear-gradient(to right, #1a2e3f, #5a6e7f )</div>
    </div>



    <script>
        let btn1 = document.querySelector(".btn1");
        let btn2 = document.querySelector(".btn2");
        let body = document.querySelector("body");
        let copycode = document.querySelector(".copycode");
        let rgb1 = "";
        let rgb2 = "";

        // color
        let getcolor = () => {
            let haxcode = "0123456789abcdef"
            let color = "#";
            for (let i = 0; i < 6; i++) {
                let rgb = haxcode[Math.floor(Math.random() * 16)];
                color += rgb;
            }
            return color;
        }



        // btn1
        btn1.addEventListener("click", () => {
            rgb1 = getcolor();

            body.style.backgroundImage = `linear-gradient(to right, ${rgb1}, ${rgb2})`;
            btn1.innerHTML = rgb1;

            copycode.innerHTML = `background-image: linear-gradient(to right, ${rgb1}, ${rgb2})`;

        })

        // btn2
        btn2.addEventListener("click", () => {
            rgb2 = getcolor();

            body.style.backgroundImage = `linear-gradient(to right, ${rgb1}, ${rgb2})`;

            btn2.innerHTML = rgb2;

            copycode.innerHTML = `background-image: linear-gradient(to right, ${rgb1}, ${rgb2})`;

        })



        copycode.addEventListener("click", () => {
            navigator.clipboard.writeText(copycode.innerText)

            copycode.previousElementSibling.innerHTML = "Copied"


        })

    </script>
</body>

</html>
