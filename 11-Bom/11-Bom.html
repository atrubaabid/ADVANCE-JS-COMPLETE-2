<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    button {
        margin-top: 10px;
    }
</style>

<body>

    <!--? ========== Start Window Property ========== -->
    <h1>WINDOW PROPERTIES</h1>

    <!-- 1 -->
    <button id="openn" onclick="window.open('https://github.com/atrubaabid', '_blank')">window.open</button><br>

    <!-- 2 -->
    <button onclick="console.log(window.innerWidth)">window.innerWidth</button><br>

    <!-- 3 -->
    <button onclick="console.log(window.innerHeight)">window.innerHeight</button><br>

    <!-- 4 -->
    <button onclick="console.log(window.outerWidth)">window.outerWidth</button><br>

    <!-- 5 -->
    <button onclick="console.log(window.outerHeight)">window.outerHeight</button><br>

    <!-- 6 -->
    <button onclick="console.log(window.scrollX)">window.scrollX</button><br>

    <!-- 7 -->
    <button onclick="console.log(window.scrollY)">window.scrollY</button><br>

    <!-- 8 -->
    <button onclick="window.console.log('console here')">window.console.log()</button><br>


    <!-- 9 -->
    <button onclick="window.alert('Atruba')">window.alert()</button><br>

    <!-- 10 -->
    <button onclick="window.confirm('Atruba')">window.confirm()</button><br>

    <!-- 11 -->
    <button onclick="window.prompt('what\'s your name')">window.prompt()</button><br>

    <!--? ========== End Window Property ========== -->


    <!--? ========== Start Navigator Object ========== -->


    <h1>NAVIGATOR OBJECT</h1>

    <!-- 1 -->
    <button onclick="console.log(navigator.userAgent)">navigator.userAgent</button><br>

    <!-- 2 -->
    <button onclick="console.log(navigator.language)">navigator.language</button><br>

    <!-- 3 -->
    <button onclick="console.log(navigator.cookieEnabled)">navigator.cookieEnabled</button><br>

    <!-- 4 -->
    <button onclick="console.log(navigator.platform)">navigator.platform</button><br>

    <!-- 5 -->
    <button onclick="console.log(navigator.onLine)">navigator.onLine</button><br>

    <!--? ========== End Navigator Object ========== -->


    <!--? ========== Start History Object ========== -->


    <h1>HISTORY OBJECT</h1>

    <!-- 1 -->
    <button onclick="history.back()">history.back()</button><br>

    <!-- 2 -->
    <button onclick="history.forward()">history.forward()</button><br>

    <!-- 3 -->
    <button onclick="history.go(-1)">history.go(-1) back</button><br>

    <!-- 4 -->
    <button onclick="history.go(1)">history.go(1) forward</button><br>


    <!--? ========== End History Object ========== -->

    <!--? ========== Start Location Object ========== -->

    <h1>LOCATION OBJECT</h1>

    <!-- 1 -->
    <button onclick="console.log(location.href)">location.href</button><br>

    <!-- 2 -->
    <button onclick="console.log(location.hostname)">location.hostname</button><br>

    <!-- 3 -->
    <button onclick="console.log(location.pathname)">location.pathname</button><br>

    <!-- 4 -->
    <button onclick="console.log(location.protocol)">location.protocol</button><br>

    <!-- 5 -->
    <button onclick="console.log(location.search)">location.search</button><br>

    <!-- 6 -->
    <button onclick="location.assign('https://google.com')">location.assign()</button><br>

    <!-- 7 -->
    <button onclick="location.replace('https://google.com')">location.replace()</button><br>

    <!-- 8 -->
    <button onclick="location.reload()">location.reload()</button><br>

    <!--? ========== End Location Object ========== -->

    <!--? ========== Start Search Screen ========== -->

    <h1>SCREEN OBJECT</h1>

    <!-- 1 -->
    <button onclick="console.log(screen.width)">screen.width</button><br>

    <!-- 2 -->
    <button onclick="console.log(screen.height)">screen.height</button><br>

    <!-- 3 -->
    <button onclick="console.log(screen.availWidth)">screen.availWidth</button><br>

    <!-- 4 -->
    <button onclick="console.log(screen.availHeight)">screen.availHeight</button><br>

    <!-- 5 -->
    <button onclick="console.log(screen.colorDepth)">screen.colorDepth</button><br>

    <!-- 6 -->
    <button onclick="console.log(screen.pixelDepth)">screen.pixelDepth</button><br>

    <!-- 7 -->
    <button onclick="console.log(screen.orientation)">screen.orientation</button><br>


    <!--? ========== End Search Screen ========== -->

</body>

</html>
